name: Textcavator
options:
  bundleIdPrefix: com.textcavator
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: Textcavator
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Textcavator:
    type: application
    platform: macOS
    sources:
      - path: Textcavator
        type: group
    settings:
      base:
        INFOPLIST_FILE: Textcavator/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.textcavator.app
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Textcavator/Textcavator.entitlements